name: Feishu News Bot

on:
  # 定时触发：UTC 时间 01:00（北京时间 09:00）
  schedule:
    - cron: '0 1 * * *'

  # 手动触发支持
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 运行飞书新闻机器人
      - name: Run Feishu News Bot
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python feishu_news_bot.py

      # 5. 状态回写 - 将更新后的 news_history.json 提交回仓库
      - name: Commit and push history file
        run: |
          # 配置 git 用户信息
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 添加历史记录文件
          git add news_history.json

          # 检查是否有实质修改，有则提交并推送（带防冲突处理）
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update history [skip ci]" && git pull --rebase && git push origin main)
