name: Feishu News Bot

on:
  # 定时触发：UTC 时间 01:00（北京时间 09:00）
  schedule:
    - cron: '0 1 * * *'

  # 手动触发支持
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 运行飞书新闻机器人
      - name: Run Feishu News Bot
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python feishu_news_bot.py

      # 5. 状态回写 - 将更新后的 news_history.json 提交回仓库
      - name: Commit and push history file
        run: |
          # 配置 git 用户信息（使用 github-actions 机器人）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 检查文件是否存在且有更改
          if [ ! -f news_history.json ]; then
            echo "news_history.json 不存在，跳过提交"
            exit 0
          fi

          # 检查是否有更改
          if git diff --quiet news_history.json 2>/dev/null && git diff --cached --quiet news_history.json 2>/dev/null; then
            echo "news_history.json 没有变化，跳过提交"
          else
            echo "检测到 news_history.json 变化，准备提交..."
            git add news_history.json
            git commit -m "chore: update news history [$(date +%Y-%m-%d)]"
            git push
            echo "已成功推送到远程仓库"
          fi
